  PURPOSE
  This is the local HTML wrapper for the Demo 1 p5.js sketch. It loads p5.js
  and ml5.js from CDNs and then runs sketch.js, which classifies live webcam
  frames using a Teachable Machine image model.

  HOW TO USE
  Open this file in any modern browser (Chrome, Edge, Firefox, or Safari).
  Grant camera access when prompted. The sketch will start classifying
  immediately.

  If you prefer OpenProcessing, paste the contents of sketch.js into a new
  sketch there — you do not need this HTML file.
  ============================================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo 1 — Hat Classifier | Teachable Machines Demos</title>

  <!-- p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <!-- ml5.js — image classification via Teachable Machine -->
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <script src="sketch.js"></script>
</body>
</html>
